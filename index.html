<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANE | WeHo Molten Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#030303',
                        accent: '#f0f0f0',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        border: 'rgba(255, 255, 255, 0.12)',
                    },
                    fontFamily: {
                        syne: ['Syne', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    backgroundImage: {
                        'liquid-chrome': 'linear-gradient(135deg, #e0e0e0 0%, #ffffff 50%, #888888 100%)',
                    },
                    animation: {
                        'drift-slow': 'drift 25s infinite alternate ease-in-out',
                        'drift-medium': 'drift 20s infinite alternate ease-in-out',
                        'drift-fast': 'drift 18s infinite alternate ease-in-out',
                    },
                    keyframes: {
                        drift: {
                            'from': { transform: 'translate(-10%, -10%) scale(1)' },
                            'to': { transform: 'translate(20%, 20%) scale(1.2)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030303;
            cursor: none; /* Hide default cursor */
        }
        /* Smooth scrolling setup */
        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }
        
        /* Text stroke utility */
        .text-stroke {
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            color: transparent;
        }
    </style>
<script type="importmap">
{

    "react": "https://esm.sh/react@^19.2.4",
    "@studio-freight/lenis": "https://esm.sh/@studio-freight/lenis@^1.0.42",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0"
  }
}
</script>
</head>

</body>
</html>
